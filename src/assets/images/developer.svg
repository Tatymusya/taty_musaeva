<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#00b438"/>
    </linearGradient>
    
    <linearGradient id="standGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>

    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>

    <!-- Свечение для экрана -->
    <filter id="screenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- Свечение для клавиатуры -->
    <filter id="keysGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Черный круг (фон) -->
  <circle cx="200" cy="200" r="190" fill="#0a0a0a"/>
  
  <!-- Внешнее кольцо с градиентом -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#screenGrad)" stroke-width="3" opacity="0.5"/>
  
  <!-- Монитор - рамка -->
  <rect x="120" y="120" width="160" height="110" rx="8" fill="#1a1a2e" stroke="url(#screenGrad)" stroke-width="3"/>
  
  <!-- Экран с градиентом -->
  <rect x="128" y="128" width="144" height="94" rx="4" fill="#16213e"/>
  
  <!-- Код на экране (линии) -->
  <g opacity="0.8">
    <rect x="138" y="140" width="60" height="4" rx="2" fill="#9d4edd"/>
    <rect x="138" y="148" width="80" height="4" rx="2" fill="#ff6b35"/>
    <rect x="138" y="156" width="50" height="4" rx="2" fill="#00b438"/>
    <rect x="138" y="164" width="70" height="4" rx="2" fill="#64ffda"/>
    <rect x="138" y="172" width="45" height="4" rx="2" fill="#9d4edd"/>
    <rect x="138" y="180" width="75" height="4" rx="2" fill="#ff6b35"/>
    <rect x="138" y="188" width="55" height="4" rx="2" fill="#00b438"/>
    <rect x="138" y="196" width="65" height="4" rx="2" fill="#64ffda"/>
  </g>
  
  <!-- Подставка монитора -->
  <rect x="185" y="230" width="30" height="25" fill="url(#standGrad)" opacity="0.9"/>
  
  <!-- Основание подставки -->
  <ellipse cx="200" cy="265" rx="45" ry="12" fill="url(#standGrad)"/>
  
  <!-- Клавиатура -->
  <rect x="140" y="285" width="120" height="50" rx="6" fill="#1a1a2e" stroke="url(#keyboardGrad)" stroke-width="2"/>
  
  <!-- Клавиши (упрощенно) -->
  <g filter="url(#keysGlow)">
    <!-- Ряд 1 -->
    <rect x="150" y="293" width="8" height="8" rx="2" fill="#9d4edd"/>
    <rect x="162" y="293" width="8" height="8" rx="2" fill="#ff6b35"/>
    <rect x="174" y="293" width="8" height="8" rx="2" fill="#00b438"/>
    <rect x="186" y="293" width="8" height="8" rx="2" fill="#64ffda"/>
    <rect x="198" y="293" width="8" height="8" rx="2" fill="#9d4edd"/>
    <rect x="210" y="293" width="8" height="8" rx="2" fill="#ff6b35"/>
    <rect x="222" y="293" width="8" height="8" rx="2" fill="#00b438"/>
    <rect x="234" y="293" width="8" height="8" rx="2" fill="#64ffda"/>
    
    <!-- Ряд 2 -->
    <rect x="150" y="305" width="8" height="8" rx="2" fill="#ff6b35"/>
    <rect x="162" y="305" width="8" height="8" rx="2" fill="#00b438"/>
    <rect x="174" y="305" width="8" height="8" rx="2" fill="#64ffda"/>
    <rect x="186" y="305" width="8" height="8" rx="2" fill="#9d4edd"/>
    <rect x="198" y="305" width="8" height="8" rx="2" fill="#ff6b35"/>
    <rect x="210" y="305" width="8" height="8" rx="2" fill="#00b438"/>
    <rect x="222" y="305" width="8" height="8" rx="2" fill="#64ffda"/>
    <rect x="234" y="305" width="8" height="8" rx="2" fill="#9d4edd"/>
    
    <!-- Ряд 3 -->
    <rect x="150" y="317" width="8" height="8" rx="2" fill="#00b438"/>
    <rect x="162" y="317" width="8" height="8" rx="2" fill="#64ffda"/>
    <rect x="174" y="317" width="8" height="8" rx="2" fill="#9d4edd"/>
    <rect x="186" y="317" width="8" height="8" rx="2" fill="#ff6b35"/>
    <rect x="198" y="317" width="8" height="8" rx="2" fill="#00b438"/>
    <rect x="210" y="317" width="8" height="8" rx="2" fill="#64ffda"/>
    <rect x="222" y="317" width="8" height="8" rx="2" fill="#9d4edd"/>
    <rect x="234" y="317" width="8" height="8" rx="2" fill="#ff6b35"/>
    
    <!-- Пробел -->
    <rect x="175" y="329" width="50" height="6" rx="3" fill="url(#keyboardGrad)"/>
  </g>
  
  <!-- Декоративные элементы (искры/звезды) -->
  <g fill="#64ffda" opacity="0.6">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="320" cy="100" r="2"/>
    <circle cx="340" cy="280" r="3"/>
    <circle cx="60" cy="300" r="2"/>
    <circle cx="350" cy="60" r="2"/>
    <circle cx="50" cy="340" r="3"/>
  </g>
  
  <!-- Логотип IP в углу -->
  <g transform="translate(280, 280)">
    <text x="0" y="0" fill="#64ffda" font-family="Arial, sans-serif" font-size="14" font-weight="bold">&lt;/&gt;</text>
  </g>
</svg>
